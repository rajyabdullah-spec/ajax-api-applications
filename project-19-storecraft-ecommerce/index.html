<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StoreCraft - E-Commerce Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark border-bottom border-secondary sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold text-warning" href="#">🛒 StoreCraft</a>
            <div class="d-flex align-items-center">
                <span class="badge bg-warning text-dark fw-bold fs-6 px-3 py-2">Cart: <span id="cartCounter">0</span></span>
            </div>
        </div>
    </nav>

    <header class="bg-gradient-dark text-center py-5 mb-4 border-bottom border-secondary">
        <div class="container">
            <h1 class="display-4 fw-bold text-white mb-2">Modern Product Catalog</h1>
            <p class="lead text-warning fw-semibold">Dynamically fetching structured JSON data from production API endpoints.</p>
            
            <div class="row justify-content-center mt-4">
                <div class="col-md-6">
                    <input type="text" id="productSearchInput" class="form-control form-control-lg bg-dark text-white border-secondary" placeholder="Search products by title...">
                </div>
            </div>
        </div>
    </header>

    <main class="container mb-5">
        
        <div id="catalogSpinner" class="text-center my-5">
            <div class="spinner-border text-warning" style="width: 3rem; height: 3rem;" role="status"></div>
            <p class="text-muted mt-2">Streaming real-time inventory payload...</p>
        </div>

        <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-4" id="productsGrid"></div>
        
    </main>

    <script src="app.js"></script>
</body>
</html>
