<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyCast - Weather Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container min-vh-100 d-flex flex-column justify-content-center align-items-center py-4">
        
        <div class="card search-card p-4 shadow-lg text-center mb-4 w-100" style="max-width: 500px;">
            <h1 class="fw-bold mb-3 text-info">🌤️ SkyCast Dashboard</h1>
            <p class="text-light opacity-75 small">Enter a city name to retrieve live climate and meteorological metrics.</p>
            
            <form id="weatherForm" class="d-flex gap-2 mt-2">
                <input type="text" id="cityInput" class="form-control form-control-lg bg-dark text-white border-secondary" placeholder="e.g., Amsterdam, Tokyo..." required>
                <button type="submit" class="btn btn-info btn-lg fw-bold text-white px-4">Go</button>
            </form>
        </div>

        <div id="loadingSpinner" class="spinner-border text-info my-3 d-none" role="status"></div>

        <div id="weatherDisplayCard" class="card display-card p-4 shadow-lg text-center text-white d-none w-100" style="max-width: 500px;">
            <h2 id="cityName" class="fw-bold text-warning mb-1">City Name</h2>
            <p id="weatherDescription" class="text-capitalize text-info fw-bold mb-3">Clear Sky</p>
            
            <div class="main-stats my-3">
                <span id="temperatureDisplay" class="display-2 fw-bold">25</span><span class="display-4 text-info">°C</span>
            </div>

            <div class="row g-3 mt-2 border-top border-secondary pt-3">
                <div class="col-6">
                    <div class="p-2 rounded bg-dark-opacity">
                        <small class="text-light d-block mb-1">Humidity</small>
                        <span id="humidityDisplay" class="fw-bold fs-5 text-warning">60%</span>
                    </div>
                </div>
                <div class="col-6">
                    <div class="p-2 rounded bg-dark-opacity">
                        <small class="text-light d-block mb-1">Wind Speed</small>
                        <span id="windDisplay" class="fw-bold fs-5 text-warning">5.2 m/s</span>
                    </div>
                </div>
            </div>
        </div>

        <div id="errorDisplay" class="alert alert-danger d-none text-center w-100" style="max-width: 500px;" role="alert"></div>

    </div>

    <script src="app.js"></script>
</body>
</html>
