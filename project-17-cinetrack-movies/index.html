<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineTrack Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="hero-section text-center mb-5">
        <div class="container">
            <h1 class="display-4 fw-bold text-warning mb-3">🎬 CineTrack Dashboard</h1>
            <p class="lead text-light fw-medium">Discover insights and structural data for millions of movies and series.</p>
            
            <div class="row justify-content-center mt-4">
                <div class="col-md-6">
                    <form id="searchForm" class="d-flex gap-2">
                        <input type="text" id="searchInput" class="form-control form-control-lg bg-dark text-white border-secondary" placeholder="Search for a movie..." required>
                        <button type="submit" class="btn btn-warning btn-lg fw-bold px-4">Search</button>
                    </form>
                </div>
            </div>
        </div>
    </header>

    <main class="container mb-5">
        <div id="statusMessage" class="text-center d-none">
            <div class="spinner-border text-warning" role="status"></div>
        </div>

        <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-4" id="moviesGrid"></div>
    </main>

    <script src="app.js"></script>
</body>
</html>
